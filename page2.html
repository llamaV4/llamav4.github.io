<!DOCTYPE html>
<html>
<head> 
    <title>Test2</title>
    <style>
      body {
        background-color: #2f0a28;
        background-image: url("dame un grrrr.jpg"), url("dame un grrrr.jpg");
        background-repeat: repeat-y, repeat-y;
        background-size: 150px, 150px;
        background-position: left center, right center;
        color: #F5C2F4;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 20px;
        transition: background-color 0.5s;
      }

      h1 {
        font-size: 60px;
        color: #F5C2F4;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%   { transform: translateY(0px); }
        50%  { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }

      h2 {
        font-size: 40px;
        color: #F5C2F4;
        margin-top: 60px;
      }

      p {
        font-size: 18px;
        color: #F5C2F4;
        max-width: 600px;
        margin: 0 auto 30px auto;
      }

      .gallery {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin: 20px auto;
        max-width: 900px;
      }

      .gallery img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 15px;
        border: 3px solid #F5C2F4;
      }

      .section {
        margin-bottom: 80px;
      }

      button {
        font-size: 20px;
        padding: 15px 30px;
        background-color: #F5C2F4;
        color: #1a1a1a;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 20px;
      }
    </style>
</head>
<body>

  <h1>Test2</h1>
  <button onclick="window.location.href='index.html'">go back</button>

  <div class="section">
    <h2>test</h2>
    <p>robbed win</p>
    <video src="robbed.mp4" width="800" controls></video>
  </div>

</body>
</html>
